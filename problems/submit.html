<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit a Problem - CUHK-Shenzhen AI Math Problems</title>
  <link rel="icon" type="images/png" href="../images/cuhk.png">
  <link rel="stylesheet" href="problems.css?v=4">
</head>
<body>
  <header class="top">
    <h1 class="site-title"><a href="index.html">CUHK-Shenzhen AI Math Problems</a></h1>
    <nav class="nav" aria-label="Main navigation">
      <a href="tags.html">Tags</a>
    </nav>
  </header>

  <main>
    <h1>Submit a Problem</h1>
    <p><a class="button-link" href="index.html">Back to database</a></p>
    <form class="submit-form" id="submit-problem-form">
      <label for="problem-statement">Problem statement</label>
      <textarea id="problem-statement" rows="11" required></textarea>

      <label for="problem-author">Author</label>
      <input id="problem-author" type="text" required>

      <label for="submitter-contact">Submitter contact (optional)</label>
      <input id="submitter-contact" type="text">

      <label for="submitter-website">Submitter website (optional)</label>
      <input id="submitter-website" type="text">

      <label for="verification-notes">Automatic solution verification script / Other notes</label>
      <textarea id="verification-notes" rows="7"></textarea>

      <label class="spam-trap" for="submitter-company">Company</label>
      <input class="spam-trap" id="submitter-company" type="text" tabindex="-1" autocomplete="off" data-spam-trap>

      <button type="submit">Submit</button>
      <p id="submission-status" class="submission-status" aria-live="polite"></p>
    </form>
  </main>

  <script type="module" src="submissions.js"></script>
</body>
</html>
