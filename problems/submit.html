<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submit a Problem - CUHK-Shenzhen AI Math Problems</title>
  <link rel="icon" type="images/png" href="../images/cuhk.png">
  <link rel="stylesheet" href="problems.css?v=4">
</head>
<body>
  <header class="top">
    <h1 class="site-title"><a href="index.html">CUHK-Shenzhen AI Math Problems</a></h1>
    <nav class="nav" aria-label="Main navigation">
      <a href="inbox.html">Inbox</a>
      <a href="tags.html">Tags</a>
      <a href="../index.html">Dmitry Rybin</a>
    </nav>
  </header>

  <main>
    <h1>Submit a Problem</h1>
    <form class="submit-form" id="submit-problem-form">
      <label for="problem-statement">Problem statement</label>
      <textarea id="problem-statement" rows="11" required></textarea>

      <label for="problem-author">Author</label>
      <input id="problem-author" type="text" required>

      <label for="submitter-contact">Submitter contact (optional)</label>
      <input id="submitter-contact" type="text">

      <button type="submit">Prepare submission</button>
    </form>

    <section class="submission-result" id="submission-result" hidden>
      <h2>Submission Ready</h2>
      <p id="submission-status"></p>
      <p><a id="email-link" href="mailto:rybindmitry1@gmail.com">Open email</a></p>
      <textarea id="submission-copy" rows="12" readonly></textarea>
      <button type="button" id="copy-submission">Copy submission</button>
      <a class="button-link" id="download-submission" download="problem-submission.txt" href="#">Download text file</a>
    </section>
  </main>

  <script>
    const recipient = 'rybindmitry1@gmail.com';

    function submissionText(statement, author, contact) {
      return [
        'Problem statement:',
        statement,
        '',
        'Author:',
        author,
        '',
        'Submitter contact:',
        contact || 'not provided'
      ].join('\n');
    }

    document.getElementById('submit-problem-form').addEventListener('submit', function (event) {
      event.preventDefault();

      const statement = document.getElementById('problem-statement').value.trim();
      const author = document.getElementById('problem-author').value.trim();
      const contact = document.getElementById('submitter-contact').value.trim();
      const message = submissionText(statement, author, contact);
      const mailto = 'mailto:' + recipient +
        '?subject=' + encodeURIComponent('Problem submission') +
        '&body=' + encodeURIComponent(message);

      document.getElementById('submission-result').hidden = false;
      document.getElementById('submission-copy').value = message;
      document.getElementById('email-link').href = mailto;
      document.getElementById('download-submission').href =
        URL.createObjectURL(new Blob([message], { type: 'text/plain' }));

      document.getElementById('submission-status').textContent =
        'Copy the prepared submission below, download it, or open an email draft to ' + recipient + '.';
    });

    document.getElementById('copy-submission').addEventListener('click', function () {
      const copyBox = document.getElementById('submission-copy');

      if (navigator.clipboard) {
        navigator.clipboard.writeText(copyBox.value);
      } else {
        copyBox.select();
        document.execCommand('copy');
      }
    });
  </script>
</body>
</html>
